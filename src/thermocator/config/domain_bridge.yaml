# ============================================================
#  domain_bridge.yaml
#
#  Install domain_bridge:
#    sudo apt install ros-jazzy-domain-bridge
#
#  This replaces DtMediator entirely.
#  domain_bridge runs as a single process that holds
#  subscriptions in both domains simultaneously — something
#  a regular rclcpp node cannot do.
#
#  Domain 38 = physical robot/navigation stack
#  Domain 1 = Gazebo digital twin
# ============================================================

name: thermocator_domain_bridge
topics:
  # Domain 38 -> Domain 1: physical/navigation state into the digital twin.
  map:
    type: nav_msgs/msg/OccupancyGrid
    from_domain: 38
    to_domain: 1
    wait_for_publisher: true
    qos:
      reliability: reliable
      durability: transient_local
      history: keep_last
      depth: 1

  thermal_map:
    type: nav_msgs/msg/OccupancyGrid
    from_domain: 38
    to_domain: 1
    wait_for_publisher: true
    qos:
      reliability: reliable
      durability: transient_local
      history: keep_last
      depth: 1

  global_costmap/costmap:
    type: nav_msgs/msg/OccupancyGrid
    from_domain: 38
    to_domain: 1
    wait_for_publisher: true
    qos:
      reliability: reliable
      durability: transient_local
      history: keep_last
      depth: 1

  odom:
    type: nav_msgs/msg/Odometry
    from_domain: 38
    to_domain: 1
    wait_for_publisher: true
    qos:
      reliability: reliable
      durability: volatile
      history: keep_last
      depth: 10

  # Domain 1 -> Domain 38: advisory only. No cmd_vel, odometry, or sensor data.
  advisory/goal:
    type: geometry_msgs/msg/PoseStamped
    from_domain: 1
    to_domain: 38
    wait_for_publisher: true
    qos:
      reliability: reliable
      history: keep_last
      depth: 1
