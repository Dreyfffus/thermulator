# ============================================================
#  domain_bridge.yaml
#
#  Install domain_bridge:
#    sudo apt install ros-jazzy-domain-bridge
#
#  domain_bridge runs as a single process that holds
#  subscriptions in both domains simultaneously -- something
#  a regular rclcpp node cannot do.
#
#  Domain 38 = physical robot / robot-sim + navigation stack
#  Domain 1  = digital twin (full thermocator stack + Gazebo)
#
#  New twin design:
#    - The twin runs its OWN full thermocator stack (SLAM, Nav2,
#      thermal map builder, decision node), so /map, /thermal_map
#      and /global_costmap are produced locally on each domain and
#      are NO LONGER bridged (that would create duplicate publishers).
#    - Each decision node publishes scored goal candidates; the
#      twin's candidates are bridged 1 -> 38 to the goal_arbiter.
#    - The twin robot is no longer teleported. It moves along with
#      the real robot's navigation commands, so /cmd_vel is bridged
#      38 -> 1 and replayed into the twin's Gazebo by ros_gz_bridge.
#    - Battery state is bridged 38 -> 1 ("state synced") for logging.
# ============================================================

name: thermocator_domain_bridge
topics:
  # Domain 38 -> Domain 1: drive the twin with the real robot's nav commands.
  cmd_vel:
    type: geometry_msgs/msg/TwistStamped
    from_domain: 38
    to_domain: 1
    wait_for_publisher: false
    qos:
      reliability: reliable
      durability: volatile
      history: keep_last
      depth: 10

  # Domain 38 -> Domain 1: battery level synced to the twin for logging.
  battery_state:
    type: sensor_msgs/msg/BatteryState
    from_domain: 38
    to_domain: 1
    wait_for_publisher: false
    qos:
      reliability: reliable
      durability: volatile
      history: keep_last
      depth: 10

  # Domain 1 -> Domain 38: twin's scored goal candidates into the arbiter.
  thermocator/goals:
    type: thermocator_msgs/msg/GoalCandidate
    from_domain: 1
    to_domain: 38
    wait_for_publisher: false
    qos:
      reliability: reliable
      durability: volatile
      history: keep_last
      depth: 10

  thermocator/state/local:
    type: thermocator_msgs/msg/MissionState
    from_domain: 38
    to_domain: 1
    wait_for_publisher: false
    qos:
      reliability: reliable
      durability: volatile
      history: keep_last
      depth: 10

  thermocator/state/twinned:
    type: thermocator_msgs/msg/MissionState
    from_domain: 1
    to_domain: 38
    wait_for_publisher: false
    qos:
      reliability: reliable
      durability: volatile
      history: keep_last
      depth: 10
