# =============================================================================
# thermocator_params.yaml
# Runtime parameters for all thermocator nodes.
# Edit this file to tune behavior without recompiling or modifying launch files.
# =============================================================================

thermal_broadcaster:
  ros__parameters:
    map_frame: "map"
    robot_frame: "base_footprint"
    publish_rate: 2.5
    noise_stdev: 0.5
    zone_centers_x: [0.0, 1.5]
    zone_centers_y: [0.0, -1.0]
    zone_peak_temps: [80.0, 60.0]
    zone_sigmas: [1.2, 1.2]

thermal_map_builder:
  ros__parameters:
    map_frame: "map"
    robot_frame: "base_footprint"
    cold_threshold: 0.0
    hot_threshold: 80.0
    min_confidence: 0.5
    publish_rate: 1.0
    tf_timeout: 0.1
    prefill_map: false
    prefill_temperature: 20.0

decision_node:
  ros__parameters:
    map_frame: "map"
    robot_frame: "base_footprint"
    control_rate: 1.0

    coverage_threshold: 0.95
    sensor_coverage_radius: 0.5
    goal_min_distance: 0.5
    goal_timeout_seconds: 70.0
    rescan_interval_seconds: 60.0
    radius_initial: 1.5
    radius_step: 0.5
    radius_max: 8.0
    samples_per_cycle: 40
    corridor_bonus: 0.3

    action_zone_heat_threshold: 60.0
    action_zone_cluster_radius: 1.5
    action_zone_base_sigma: 0.4
    action_delay_seconds: 1.0
    max_search_cells: 250
